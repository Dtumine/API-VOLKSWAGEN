<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Ventas - Sistema</title>

<style>
body { font-family: Arial; background: #f5f7fa; padding:20px; }
.container { max-width:1100px; margin:auto; background:white; padding:25px; border-radius:10px; box-shadow:0 5px 20px rgba(0,0,0,0.08); }

.form-group { margin-bottom:12px; }
label { display:block; font-weight:bold; margin-bottom:4px; }

input, select {
width:100%;
padding:8px;
border-radius:6px;
border:1px solid #ccc;
}

button {
padding:8px 14px;
border:none;
border-radius:6px;
cursor:pointer;
color:white;
}

.btn-success{background:#28a745;}
.btn-edit{background:#ffc107;color:black;}
.btn-delete{background:#dc3545;}
.btn-cancel{background:#6c757d;}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
border:1px solid #ddd;
padding:6px;
font-size:14px;
}

th{
background:#f0f0f0;
}

.auto-box{
padding:10px;
background:#f4f6f8;
border:1px solid #ddd;
border-radius:6px;
}
</style>
</head>

<body>

<div class="container">

<h1>Ventas</h1>

<section>

<h2>Crear / Editar Venta</h2>

<form id="ventaForm">

<input type="hidden" id="id_venta"/>

<div class="form-group">
<label>Cliente</label>
<select id="id_cliente" required></select>
</div>

<div class="form-group">
<label>Auto del Cliente</label>
<div id="auto_info" class="auto-box">Seleccione un cliente...</div>
<input type="hidden" id="id_auto"/>
</div>

<div class="form-group">
<label>Empleado</label>
<select id="id_empleado" required></select>
</div>

<div class="form-group">
<label>Fecha</label>
<input type="date" id="fecha_venta" required/>
</div>

<div class="form-group">
<label>Total</label>
<input type="number" id="total" step="0.01" required/>
</div>

<div class="form-group">
<label>Estado</label>
<select id="anulada">
<option value="false">Activa</option>
<option value="true">Anulada</option>
</select>
</div>

<button type="submit" class="btn-success">Guardar</button>
<button type="button" class="btn-cancel" onclick="cancelEdit()">Cancelar</button>

</form>

</section>

<section>

<h2>Listado de Ventas</h2>
<div id="ventasList"></div>

</section>

</div>

<script src="ventas.js"></script>

</body>
</html>
